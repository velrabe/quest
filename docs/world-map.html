<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карта локаций — вид сверху</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #141820;
      --panel: #1c222c;
      --border: #2e3848;
      --text: #e8eaed;
      --muted: #8b95a8;
      --accent: #5a9fd4;
      --north: #c45c5c;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; }

    .app { display: flex; height: 100%; overflow: hidden; }

    .sidebar {
      width: 300px;
      min-width: 260px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .sidebar-header p { font-size: 12px; color: var(--muted); line-height: 1.4; }

    .controls { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
    .controls label { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
    .controls input[type="checkbox"] { accent-color: var(--accent); }

    .coord-box {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-family: ui-monospace, monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .coord-box .label { color: var(--muted); font-family: system-ui, sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }

    .location-list { flex: 1; overflow-y: auto; padding: 8px; }
    .loc-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 4px;
    }
    .loc-item:hover { background: rgba(255,255,255,0.04); }
    .loc-item.active { border-color: var(--accent); background: rgba(90,159,212,0.12); }
    .loc-item .name { font-weight: 500; font-size: 13px; }
    .loc-item .meta { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: ui-monospace, monospace; }

    .map-wrap { flex: 1; position: relative; overflow: hidden; cursor: grab; background: #0e1218; }
    .map-wrap.dragging { cursor: grabbing; }

    svg { display: block; width: 100%; height: 100%; }

    .toolbar {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 6px;
      z-index: 2;
    }
    .toolbar button {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    .toolbar button:hover { border-color: var(--accent); }

    .compass {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 12px;
      line-height: 1.5;
      z-index: 2;
    }
    .compass .north { color: var(--north); font-weight: 600; }

    .legend {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 11px;
      line-height: 1.8;
      z-index: 2;
      max-height: 180px;
      overflow-y: auto;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; }

    .detail-panel {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 290px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      display: none;
      z-index: 2;
    }
    .detail-panel.visible { display: block; }
    .detail-panel h3 { font-size: 14px; margin-bottom: 8px; }
    .detail-panel p { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
    .detail-panel .coords { font-family: ui-monospace, monospace; font-size: 12px; margin-bottom: 10px; }
    .detail-panel button {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
    }
    .detail-panel button:hover { opacity: 0.9; }

    .lab-inset {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .lab-inset svg { width: 100%; height: 180px; background: rgba(0,0,0,0.25); border-radius: 4px; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--panel);
      border: 1px solid var(--accent);
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 13px;
      transition: transform 0.25s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .loc-marker.selected > .hit-area { stroke: #fff; stroke-width: 1.5; stroke-dasharray: 3 2; fill: rgba(90,159,212,0.15); }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Карта локаций</h1>
        <p>Terrain 300×300 м. Клик — координаты Unity. Колёсико — зум, перетаскивание — панорама.</p>
      </div>
      <div class="controls">
        <label><input type="checkbox" id="toggleGrid"> Сетка (10 м)</label>
        <label><input type="checkbox" id="toggleElev" checked> Рельеф + hillshade</label>
        <label><input type="checkbox" id="toggleContours" checked> Изолинии</label>
        <label><input type="checkbox" id="toggleNature" checked> Растительность</label>
        <label><input type="checkbox" id="toggleLabels" checked> Подписи</label>
        <label><input type="checkbox" id="togglePaths" checked> Дороги / инфраструктура</label>
        <label><input type="checkbox" id="toggleLab" checked> План лаборатории</label>
      </div>
      <div class="coord-box">
        <div class="label">Курсор</div>
        <div id="cursorCoords">X: — &nbsp; Z: — &nbsp; Y: —</div>
      </div>
      <div class="location-list" id="locationList"></div>
    </aside>

    <main class="map-wrap" id="mapWrap">
      <div class="compass">
        <div class="north">▲ СЕВЕР (+Z)</div>
        <div>▼ ЮГ (−Z)</div>
      </div>
      <div class="toolbar">
        <button id="btnReset">Сброс вида</button>
        <button id="btnExport">JSON</button>
      </div>
      <div class="legend" id="legend"></div>
      <div class="detail-panel" id="detailPanel">
        <h3 id="detailName"></h3>
        <p id="detailDesc"></p>
        <div class="coords" id="detailCoords"></div>
        <button id="btnCopy">Копировать Vector3</button>
        <div class="lab-inset" id="labInset" style="display:none">
          <div class="label" style="color:var(--muted);font-size:11px;margin-bottom:6px">План лаборатории (крест)</div>
          <svg id="labSvg" viewBox="-55 -55 110 110"></svg>
        </div>
      </div>
      <svg id="map" viewBox="-160 -160 320 320">
        <defs id="mapDefs"></defs>
      </svg>
    </main>
  </div>
  <div class="toast" id="toast">Скопировано</div>

  <script>
    const TERRAIN = { width: 300, length: 300, height: 80, half: 150 };
    const CELL = 5;

    const ELEV = {
      lab: 0, solar: 5, wasteland: 10, railway: 15,
      lighthouse: 40, reservoir: -15, default: 2
    };

    const LOCATIONS = [
      { id: 'lab', name: 'Лаборатория', x: 0, z: 0, y: ELEV.lab, w: 44, h: 44, shape: 'lab',
        desc: 'Центр карты. 4 секции крестом.', tz: 'Хаб игрока. Ночью — выгрузка фото.' },
      { id: 'lighthouse', name: 'Маяк', x: 110, z: 100, y: ELEV.lighthouse, w: 18, h: 18, shape: 'lighthouse',
        desc: 'На скале, доминирует над местностью.', tz: 'Локация 1. Старые записи.' },
      { id: 'railway', name: 'Железная дорога', x: -20, z: 120, y: ELEV.railway, w: 10, h: 90, shape: 'railway',
        desc: 'Рельсы к закрытому заводу.', tz: 'Локация 8.' },
      { id: 'wasteland', name: 'Пустырь', x: -110, z: 70, y: ELEV.wasteland, w: 40, h: 38, shape: 'wasteland',
        desc: 'Открытая площадка слева от рельсов.', tz: 'Локация 5.' },
      { id: 'abandoned', name: 'Заброшенное здание', x: -90, z: -60, y: ELEV.default, w: 32, h: 26, shape: 'abandoned',
        desc: 'Граффити на стенах.', tz: 'Локация 2.' },
      { id: 'solar', name: 'Солнечные панели', x: 90, z: -30, y: ELEV.solar, w: 44, h: 34, shape: 'solar',
        desc: 'Поляна за забором.', tz: 'Локация 3.' },
      { id: 'entrance', name: 'Закрытый вход', x: 40, z: -90, y: ELEV.default, w: 16, h: 16, shape: 'bunker',
        desc: 'Вход в подземную лабораторию.', tz: 'Локация 4.' },
      { id: 'offices', name: 'Недострой офисов', x: 100, z: -120, y: ELEV.default, w: 38, h: 28, shape: 'offices',
        desc: 'Незавершённые офисы на юге.', tz: 'Локация 7.' },
      { id: 'reservoir', name: 'Водохранилище', x: -110, z: -120, y: ELEV.reservoir, w: 56, h: 44, shape: 'reservoir',
        desc: 'Заброшенное водохранилище.', tz: 'Локация 6.' },
      { id: 'bridge', name: 'Мост', x: -80, z: -100, y: ELEV.default, w: 28, h: 10, shape: 'bridge',
        desc: 'Мост к водохранилищу.', tz: 'Локация 9.' }
    ];

    const LAB_ROOMS = [
      { id: 'hall', name: 'Холл', x: 0, z: 0, w: 14, h: 14, color: '#6a9070', type: 'hall' },
      { id: 'observation', name: 'Наблюдение', x: 0, z: 26, w: 16, h: 12, color: '#7088a8', type: 'obs' },
      { id: 'laboratory', name: 'Лабораторная', x: 26, z: 0, w: 16, h: 12, color: '#8878a8', type: 'lab' },
      { id: 'wards', name: 'Палаты', x: -26, z: 0, w: 16, h: 12, color: '#a08878', type: 'wards' },
      { id: 'admin', name: 'Админ.', x: 0, z: -26, w: 16, h: 12, color: '#689090', type: 'admin' }
    ];

    const ROADS = [
      { pts: [[0,0],[40,-90]], width: 3, type: 'dirt' },
      { pts: [[0,0],[-90,-60]], width: 3, type: 'dirt' },
      { pts: [[0,0],[90,-30]], width: 3, type: 'dirt' },
      { pts: [[0,0],[0,22],[-20,80]], width: 3, type: 'dirt' },
      { pts: [[-80,-100],[-110,-120]], width: 2.5, type: 'dirt' },
      { pts: [[90,-30],[100,-120]], width: 2, type: 'dirt' },
      { pts: [[-110,70],[-20,100]], width: 2.5, type: 'gravel' },
      { pts: [[110,100],[0,30],[0,0]], width: 2, type: 'path' }
    ];

    const state = { panX: 0, panY: 0, scale: 1, selected: null, dragging: false, dragStart: null };
    const mapEl = document.getElementById('map');
    const mapWrap = document.getElementById('mapWrap');
    const NS = 'http://www.w3.org/2000/svg';

    function hash(x, z) {
      const n = Math.sin(x * 127.1 + z * 311.7) * 43758.5453;
      return n - Math.floor(n);
    }

    function noise2D(x, z) {
      const ix = Math.floor(x), iz = Math.floor(z);
      const fx = x - ix, fz = z - iz;
      const a = hash(ix, iz), b = hash(ix + 1, iz);
      const c = hash(ix, iz + 1), d = hash(ix + 1, iz + 1);
      const ux = fx * fx * (3 - 2 * fx), uz = fz * fz * (3 - 2 * fz);
      return a + (b - a) * ux + (c - a) * uz + (a - b - c + d) * ux * uz;
    }

    function unityToSvg(x, z) { return { x, y: -z }; }
    function svgToUnity(sx, sy) { return { x: sx, z: -sy }; }

    function interpolateY(x, z) {
      const n = (noise2D(x * 0.04, z * 0.04) - 0.5) * 2.5;
      const dL = Math.hypot(x - 110, z - 100);
      const dR = Math.hypot(x + 110, z + 120);
      const dLab = Math.hypot(x, z);
      const dRail = Math.abs(x + 20);

      let y = ELEV.default + n;

      if (dLab < 38) y = ELEV.lab + n * 0.3;
      if (dR < 60) y = ELEV.reservoir + (1 - dR / 60) * 8 + n * 0.5;
      if (dL < 90) y = Math.max(y, ELEV.lighthouse * Math.pow(1 - dL / 90, 1.6) + n);
      if (dRail < 14 && z > 50 && z < 145) y = Math.max(y, ELEV.railway + n * 0.2);
      if (Math.hypot(x + 110, z - 70) < 28) y = Math.max(y, ELEV.wasteland + n * 0.4);
      if (Math.hypot(x - 90, z + 30) < 28) y = Math.max(y, ELEV.solar + n * 0.3);

      return Math.round(y * 10) / 10;
    }

    function hillshade(x, z) {
      const s = 2;
      const dx = interpolateY(x + s, z) - interpolateY(x - s, z);
      const dz = interpolateY(x, z + s) - interpolateY(x, z - s);
      const nx = -dx * 0.35, ny = 1, nz = -dz * 0.35;
      const len = Math.hypot(nx, ny, nz);
      const lx = 0.55, ly = 0.75, lz = 0.35;
      return Math.max(0.15, (nx / len * lx + ny / len * ly + nz / len * lz));
    }

    function biomeColor(y, x, z) {
      const shade = hillshade(x, z);
      if (y < -8) return mixColor('#1a3a55', '#0f2840', shade);
      if (y < -3) return mixColor('#2a5068', '#1e3d52', shade);
      if (y < 1 && Math.hypot(x + 110, z + 120) < 70) return mixColor('#4a6050', '#3a4a3a', shade);
      if (y > 28) return mixColor('#6a6458', '#4a4840', shade);
      if (y > 18) return mixColor('#5a5848', '#454038', shade);
      if (y > 10) return mixColor('#5a6848', '#465538', shade);
      if (Math.hypot(x + 110, z - 70) < 30) return mixColor('#6a6048', '#524838', shade);
      return mixColor('#4a6840', '#3a5234', shade);
    }

    function mixColor(light, dark, t) {
      const p = (hex, f) => {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return [r, g, b].map(c => Math.round(c * f));
      };
      const a = p(light, 0.55 + t * 0.45), b = p(dark, 0.55 + t * 0.45);
      return `rgb(${a[0]},${a[1]},${a[2]})`;
    }

    function el(tag, attrs, parent) {
      const e = document.createElementNS(NS, tag);
      for (const [k, v] of Object.entries(attrs || {})) {
        if (k === 'text') e.textContent = v;
        else e.setAttribute(k, v);
      }
      if (parent) parent.appendChild(e);
      return e;
    }

    function buildDefs() {
      const defs = document.getElementById('mapDefs');
      defs.innerHTML = `
        <pattern id="patGrass" width="6" height="6" patternUnits="userSpaceOnUse">
          <rect width="6" height="6" fill="#4a6840"/>
          <circle cx="1" cy="2" r="0.6" fill="#527048" opacity="0.5"/>
          <circle cx="4" cy="5" r="0.5" fill="#3a5838" opacity="0.4"/>
        </pattern>
        <pattern id="patWater" width="8" height="8" patternUnits="userSpaceOnUse">
          <rect width="8" height="8" fill="#1a4560"/>
          <path d="M0 4 Q2 2 4 4 Q6 6 8 4" fill="none" stroke="#2a6080" stroke-width="0.5" opacity="0.6"/>
        </pattern>
        <pattern id="patGravel" width="5" height="5" patternUnits="userSpaceOnUse">
          <rect width="5" height="5" fill="#6a6458"/>
          <circle cx="1" cy="1" r="0.7" fill="#787068"/>
          <circle cx="3.5" cy="3" r="0.5" fill="#5a5648"/>
        </pattern>
        <pattern id="patConcrete" width="4" height="4" patternUnits="userSpaceOnUse">
          <rect width="4" height="4" fill="#8a8880"/>
          <line x1="0" y1="0" x2="4" y2="4" stroke="#7a7870" stroke-width="0.3"/>
        </pattern>
        <pattern id="patCrack" width="10" height="10" patternUnits="userSpaceOnUse">
          <rect width="10" height="10" fill="#6a5a48"/>
          <path d="M2 0 L5 5 L3 10 M7 2 L10 8" fill="none" stroke="#524838" stroke-width="0.4"/>
        </pattern>
        <pattern id="patSolar" width="6" height="4" patternUnits="userSpaceOnUse">
          <rect width="6" height="4" fill="#1a3a5a"/>
          <rect x="0.3" y="0.3" width="5.4" height="3.4" fill="#2a5080" stroke="#1a3050" stroke-width="0.2"/>
        </pattern>
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0.8" dy="1.2" stdDeviation="1" flood-color="#000" flood-opacity="0.35"/>
        </filter>
        <marker id="arrowN" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
          <path d="M0,6 L3,0 L6,6" fill="#888"/>
        </marker>
      `;
    }

    function buildTerrain(g) {
      const elevG = el('g', { id: 'elevation' }, g);
      const steps = TERRAIN.width / CELL;
      const half = TERRAIN.half;

      for (let ix = 0; ix < steps; ix++) {
        for (let iz = 0; iz < steps; iz++) {
          const x = -half + ix * CELL + CELL / 2;
          const z = -half + iz * CELL + CELL / 2;
          const y = interpolateY(x, z);
          const p = unityToSvg(x - CELL / 2, z + CELL / 2);
          el('rect', {
            x: p.x, y: p.y, width: CELL, height: CELL,
            fill: biomeColor(y, x, z)
          }, elevG);
        }
      }

      const ridge = el('g', { id: 'ridge' }, g);
      el('path', {
        d: 'M 55,-70 C 80,-85 120,-75 140,-40 C 155,-10 145,40 125,85 C 110,115 95,118 80,95 C 65,70 50,40 55,-70 Z',
        fill: '#5a5448', opacity: 0.45, stroke: '#4a4438', 'stroke-width': 0.5
      }, ridge);
      el('path', {
        d: 'M 95,-50 C 105,-60 118,-55 122,-40 C 126,-25 118,-10 108,-15 C 98,-20 90,-35 95,-50 Z',
        fill: '#6a6050', opacity: 0.5
      }, ridge);
      el('text', { x: 118, y: -62, fill: '#b0a890', 'font-size': 7, 'text-anchor': 'middle', opacity: 0.8, text: 'скальный хребет' }, ridge);
    }

    function buildContours(g) {
      const contG = el('g', { id: 'contours', opacity: 0.35 }, g);
      const half = TERRAIN.half;
      const step = 5;

      for (let level = -15; level <= 45; level += 5) {
        for (let x = -half; x < half; x += step) {
          for (let z = -half; z < half; z += step) {
            const y00 = interpolateY(x, z);
            const y10 = interpolateY(x + step, z);
            const y01 = interpolateY(x, z + step);
            const y11 = interpolateY(x + step, z + step);
            const cross = (y00 - level) * (y10 - level) < 0 || (y00 - level) * (y01 - level) < 0;
            if (Math.abs(y00 - level) < 1.2) {
              const p = unityToSvg(x, z);
              el('circle', { cx: p.x, cy: p.y, r: 0.4, fill: level <= 0 ? '#6090a8' : '#908060' }, contG);
            }
          }
        }
        if (level % 10 === 0) {
          el('text', {
            x: 142, y: -(level * 2 + 50), fill: '#888', 'font-size': 6, text: `${level}m`
          }, contG);
        }
      }
    }

    function buildVegetation(g) {
      const vegG = el('g', { id: 'nature' }, g);
      const trees = [];
      for (let i = 0; i < 280; i++) {
        const x = -140 + hash(i, 0) * 280;
        const z = -140 + hash(0, i) * 280;
        const y = interpolateY(x, z);
        if (y < -5 || y > 22) continue;
        if (Math.hypot(x, z) < 28) continue;
        if (Math.hypot(x - 110, z - 100) < 22) continue;
        if (Math.hypot(x + 110, z + 120) < 35) continue;
        if (Math.hypot(x + 110, z - 70) < 22) continue;
        if (Math.abs(x + 20) < 8 && z > 55) continue;
        if (hash(i * 3, z) < 0.35) continue;
        trees.push({ x, z, r: 1.2 + hash(i, z) * 2.5, dark: hash(z, i) > 0.5 });
      }
      trees.forEach(t => {
        const p = unityToSvg(t.x, t.z);
        el('circle', { cx: p.x, cy: p.y, r: t.r + 0.8, fill: '#2a4028', opacity: 0.35 }, vegG);
        el('circle', { cx: p.x, cy: p.y, r: t.r, fill: t.dark ? '#3a5830' : '#4a6840', opacity: 0.7 }, vegG);
      });

      [[-130, 50, 12], [60, 60, 8], [-50, -30, 10], [130, -50, 6]].forEach(([x, z, r]) => {
        const p = unityToSvg(x, z);
        el('ellipse', { cx: p.x, cy: p.y, rx: r, ry: r * 0.7, fill: '#5a6848', opacity: 0.25 }, vegG);
      });
    }

    function drawRoad(x1, z1, x2, z2, width, type, g) {
      const p1 = unityToSvg(x1, z1), p2 = unityToSvg(x2, z2);
      const fill = type === 'gravel' ? 'url(#patGravel)' : type === 'dirt' ? '#6a5848' : '#7a7060';
      el('line', {
        x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y,
        stroke: fill, 'stroke-width': width, 'stroke-linecap': 'round', opacity: 0.85
      }, g);
      if (type === 'dirt') {
        el('line', {
          x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y,
          stroke: '#524838', 'stroke-width': width * 0.5, 'stroke-linecap': 'round', opacity: 0.4
        }, g);
      }
    }

    function buildInfrastructure(g) {
      const pathsG = el('g', { id: 'paths' }, g);
      ROADS.forEach(r => {
        for (let i = 0; i < r.pts.length - 1; i++) {
          drawRoad(r.pts[i][0], r.pts[i][1], r.pts[i + 1][0], r.pts[i + 1][1], r.width, r.type, pathsG);
        }
      });

      const railG = el('g', { id: 'railway' }, pathsG);
      for (let z = 55; z <= 148; z += 1.5) {
        const p = unityToSvg(-20, z);
        el('rect', { x: p.x - 4.5, y: p.y - 0.4, width: 9, height: 0.8, fill: '#5a5850' }, railG);
        if (Math.floor(z) % 3 === 0) {
          el('rect', { x: p.x - 5, y: p.y - 0.15, width: 10, height: 0.3, fill: '#3a3830' }, railG);
        }
      }
      el('line', { x1: -24.5, y1: -55, x2: -24.5, y2: -148, stroke: '#555', 'stroke-width': 1.2 }, railG);
      el('line', { x1: -15.5, y1: -55, x2: -15.5, y2: -148, stroke: '#555', 'stroke-width': 1.2 }, railG);
      el('rect', { x: -28, y: -148, width: 16, height: 8, fill: '#7a7870', rx: 1 }, railG);
      el('text', { x: -20, y: -142, fill: '#ccc', 'font-size': 4, 'text-anchor': 'middle', text: 'завод' }, railG);

      const fenceG = el('g', { id: 'fence' }, pathsG);
      const fencePath = 'M 52,8 L 128,8 L 128,68 L 52,68 Z';
      el('path', { d: fencePath, fill: 'none', stroke: '#8a6848', 'stroke-width': 0.8, 'stroke-dasharray': '2 1.5' }, fenceG);
      for (let i = 0; i < 20; i++) {
        const t = i / 20;
        const fx = 52 + (128 - 52) * (t < 0.25 ? t * 4 : t < 0.5 ? 1 : t < 0.75 ? 1 - (t - 0.5) * 4 : 0);
        const fz = t < 0.25 ? 8 : t < 0.5 ? 8 + (68 - 8) * ((t - 0.25) * 4) : t < 0.75 ? 68 : 68 - (68 - 8) * ((t - 0.75) * 4);
        const fp = unityToSvg(fx, fz);
        el('line', { x1: fp.x, y1: fp.y, x2: fp.x, y2: fp.y + 1.5, stroke: '#8a6848', 'stroke-width': 0.5 }, fenceG);
      }

      el('rect', { x: -32, y: 18, width: 64, height: 52, fill: 'none', stroke: '#6a7068', 'stroke-width': 0.6, 'stroke-dasharray': '3 2' }, fenceG);
    }

    function buildGrid(g) {
      const gridG = el('g', { id: 'grid', display: 'none' }, g);
      for (let i = -150; i <= 150; i += 10) {
        el('line', { x1: i, y1: -150, x2: i, y2: 150, stroke: '#ffffff15', 'stroke-width': i % 50 === 0 ? 0.5 : 0.2 }, gridG);
        el('line', { x1: -150, y1: -i, x2: 150, y2: -i, stroke: '#ffffff15', 'stroke-width': i % 50 === 0 ? 0.5 : 0.2 }, gridG);
      }
    }

    function drawLocation(loc, parent) {
      const p = unityToSvg(loc.x, loc.z);
      const g = el('g', {
        class: 'loc-marker', 'data-id': loc.id,
        transform: `translate(${p.x},${p.y})`, filter: 'url(#softShadow)'
      }, parent);

      el('ellipse', {
        class: 'hit-area', cx: 0, cy: 0, rx: loc.w / 2 + 4, ry: loc.h / 2 + 4,
        fill: 'transparent', stroke: 'transparent', 'stroke-width': 1
      }, g);

      const drawers = {
        lab: drawLab, lighthouse: drawLighthouse, railway: () => {},
        wasteland: drawWasteland, abandoned: drawAbandoned, solar: drawSolar,
        bunker: drawBunker, offices: drawOffices, reservoir: drawReservoir, bridge: drawBridge
      };
      (drawers[loc.shape] || drawGeneric)(g, loc);

      el('text', {
        x: 0, y: loc.h / 2 + 10, fill: '#f0f0ec', 'font-size': 7, 'text-anchor': 'middle',
        class: 'loc-label', 'paint-order': 'stroke', stroke: '#000', 'stroke-width': 2, opacity: 0.95, text: loc.name
      }, g);

      g.style.cursor = 'pointer';
      g.addEventListener('click', e => { e.stopPropagation(); selectLocation(loc.id); });
    }

    function drawLab(g) {
      el('rect', { x: -22, y: -22, width: 44, height: 44, fill: 'url(#patConcrete)', stroke: '#6a6860', 'stroke-width': 0.8, rx: 1 }, g);
      el('rect', { x: -22, y: -22, width: 44, height: 1.2, fill: '#5a5850' }, g);
      el('rect', { x: -22, y: 20.8, width: 44, height: 1.2, fill: '#5a5850' }, g);
      el('rect', { x: -22, y: -22, width: 1.2, height: 44, fill: '#5a5850' }, g);
      el('rect', { x: 20.8, y: -22, width: 1.2, height: 44, fill: '#5a5850' }, g);
      el('rect', { x: -6, y: -6, width: 12, height: 12, fill: '#707068', stroke: '#888880', 'stroke-width': 0.4 }, g);
      el('rect', { x: -18, y: 14, width: 10, height: 6, fill: '#4a5048', rx: 0.5 }, g);
      el('rect', { x: 8, y: 14, width: 10, height: 6, fill: '#4a5048', rx: 0.5 }, g);
      el('rect', { x: -3, y: 18, width: 6, height: 4, fill: '#3a4038' }, g);
    }

    function drawLighthouse(g) {
      el('ellipse', { cx: 0, cy: 2, rx: 14, ry: 10, fill: '#5a5448', opacity: 0.6 }, g);
      el('path', { d: 'M -10,8 L -6,-4 L 0,-10 L 6,-4 L 10,8 Z', fill: '#6a6050', stroke: '#4a4840', 'stroke-width': 0.5 }, g);
      el('rect', { x: -2.5, y: -14, width: 5, height: 10, fill: '#d8d0c0', stroke: '#a09888', 'stroke-width': 0.4 }, g);
      el('polygon', { points: '0,-18 3.5,-14 -3.5,-14', fill: '#c03830' }, g);
      el('circle', { cx: 0, cy: -10, r: 1.8, fill: '#ffe080', opacity: 0.9 }, g);
      el('rect', { x: 6, y: 4, width: 5, height: 4, fill: '#7a7060', rx: 0.3 }, g);
      el('path', { d: 'M -14,10 Q -8,6 0,8 Q 8,10 14,8', fill: 'none', stroke: '#8a8070', 'stroke-width': 1, opacity: 0.6 }, g);
    }

    function drawWasteland(g) {
      el('ellipse', { cx: 0, cy: 0, rx: 20, ry: 18, fill: 'url(#patCrack)' }, g);
      el('ellipse', { cx: -8, cy: 5, rx: 6, ry: 4, fill: '#524838', opacity: 0.4 }, g);
      el('rect', { x: 5, y: -6, width: 4, height: 3, fill: '#6a6050', transform: 'rotate(25)' }, g);
      el('rect', { x: -12, y: -8, width: 6, height: 2, fill: '#5a5040', transform: 'rotate(-15)' }, g);
      el('circle', { cx: 10, cy: 8, r: 2.5, fill: '#4a5838', opacity: 0.5 }, g);
    }

    function drawAbandoned(g) {
      el('path', { d: 'M -14,-10 L -14,8 L -4,8 L -4,-2 L 6,-2 L 6,8 L 14,8 L 14,-10 Z', fill: '#6a6050', stroke: '#4a4840', 'stroke-width': 0.6 }, g);
      el('path', { d: 'M -4,-2 L -4,8 L 6,8 L 6,-2 Z', fill: '#3a3830', opacity: 0.5 }, g);
      el('rect', { x: -12, y: -12, width: 8, height: 3, fill: '#5a5048', transform: 'rotate(-8)' }, g);
      el('rect', { x: 4, y: -11, width: 6, height: 2, fill: '#5a5048', transform: 'rotate(12)' }, g);
      el('text', { x: -10, y: 2, fill: '#a05070', 'font-size': 5, transform: 'rotate(-12)', text: '★' }, g);
      el('text', { x: 8, y: 4, fill: '#5080a0', 'font-size': 4, text: 'AK' }, g);
    }

    function drawSolar(g) {
      el('rect', { x: -22, y: -17, width: 44, height: 34, fill: '#4a6840', opacity: 0.4, rx: 2 }, g);
      for (let row = 0; row < 4; row++) {
        for (let col = 0; col < 5; col++) {
          el('rect', {
            x: -20 + col * 8.5, y: -15 + row * 7.5, width: 7.5, height: 6,
            fill: 'url(#patSolar)', stroke: '#1a2840', 'stroke-width': 0.2,
            transform: `rotate(${col % 2 ? -12 : -8}, ${-20 + col * 8.5 + 3.75}, ${-15 + row * 7.5 + 3})`
          }, g);
        }
      }
      el('rect', { x: 16, y: 10, width: 3, height: 2, fill: '#4a4840' }, g);
    }

    function drawBunker(g) {
      el('ellipse', { cx: 0, cy: 0, rx: 10, ry: 8, fill: '#4a5048' }, g);
      el('rect', { x: -7, y: -5, width: 14, height: 10, fill: '#6a6860', stroke: '#4a4840', 'stroke-width': 0.5, rx: 1 }, g);
      el('rect', { x: -4, y: -2, width: 8, height: 6, fill: '#3a3830' }, g);
      el('circle', { cx: 3, cy: 1, r: 0.8, fill: '#888' }, g);
      el('path', { d: 'M -12,6 Q 0,12 12,6', fill: '#5a5848', opacity: 0.5 }, g);
    }

    function drawOffices(g) {
      el('rect', { x: -18, y: -12, width: 36, height: 24, fill: 'none', stroke: '#6a6860', 'stroke-width': 0.5, 'stroke-dasharray': '2 1' }, g);
      for (let col = -14; col <= 10; col += 7) {
        el('rect', { x: col, y: -10, width: 2, height: 20, fill: '#7a7870' }, g);
      }
      for (let row = -8; row <= 6; row += 7) {
        el('rect', { x: -14, y: row, width: 28, height: 1.5, fill: '#6a6860', opacity: row > 0 ? 0.4 : 0.8 }, g);
      }
      el('rect', { x: 8, y: 4, width: 10, height: 8, fill: 'none', stroke: '#8a8070', 'stroke-width': 0.4 }, g);
      el('text', { x: 0, y: 16, fill: '#888', 'font-size': 4, 'text-anchor': 'middle', text: 'недострой' }, g);
    }

    function drawReservoir(g) {
      el('ellipse', { cx: 0, cy: 0, rx: 28, ry: 22, fill: 'url(#patWater)' }, g);
      el('path', { d: 'M -28,0 Q -14,-8 0,0 Q 14,8 28,0', fill: 'none', stroke: '#3a7898', 'stroke-width': 0.5, opacity: 0.5 }, g);
      el('rect', { x: -30, y: -4, width: 4, height: 24, fill: '#6a6458', stroke: '#4a4840', 'stroke-width': 0.4 }, g);
      el('rect', { x: -32, y: 16, width: 8, height: 3, fill: '#5a5448' }, g);
      el('path', { d: 'M -26,18 L -20,22 L -14,18', fill: 'none', stroke: '#4a7898', 'stroke-width': 0.8 }, g);
      el('ellipse', { cx: -18, cy: 20, rx: 8, ry: 3, fill: '#2a5068', opacity: 0.5 }, g);
      el('ellipse', { cx: 12, cy: -16, rx: 10, ry: 4, fill: '#4a5848', opacity: 0.4 }, g);
    }

    function drawBridge(g) {
      el('rect', { x: -14, y: -5, width: 28, height: 10, fill: '#5a5448', opacity: 0.3, rx: 2 }, g);
      el('rect', { x: -13, y: -3, width: 26, height: 6, fill: '#8a8070', rx: 0.5 }, g);
      for (let i = -10; i <= 10; i += 5) {
        el('line', { x1: i, y1: -3, x2: i, y2: 3, stroke: '#5a5040', 'stroke-width': 0.8 }, g);
      }
      el('line', { x1: -13, y1: 0, x2: 13, y2: 0, stroke: '#4a4840', 'stroke-width': 0.5 }, g);
    }

    function drawGeneric(g, loc) {
      el('rect', { x: -loc.w / 2, y: -loc.h / 2, width: loc.w, height: loc.h, fill: '#6a6860', rx: 1 }, g);
    }

    function drawLabPlan(parent, detailed) {
      const p = unityToSvg(0, 0);
      const g = el('g', { transform: `translate(${p.x},${p.y})`, id: 'labCross' }, parent);

      el('rect', { x: -34, y: -34, width: 68, height: 68, fill: 'url(#patConcrete)', opacity: 0.3, rx: 1 }, g);

      LAB_ROOMS.forEach(room => {
        const rp = unityToSvg(room.x, room.z);
        const wall = 1;
        el('rect', {
          x: rp.x - room.w / 2, y: rp.y - room.h / 2,
          width: room.w, height: room.h,
          fill: room.color, stroke: '#2a3028', 'stroke-width': 0.8, rx: 0.5
        }, g);

        if (detailed) {
          if (room.type === 'obs') {
            el('rect', { x: rp.x - 4, y: rp.y - 5, width: 8, height: 6, fill: '#8090a8', opacity: 0.5 }, g);
          }
          if (room.type === 'lab') {
            for (let i = -4; i <= 4; i += 4) el('rect', { x: rp.x + i - 1, y: rp.y - 3, width: 2, height: 6, fill: '#9888a8', opacity: 0.5 }, g);
          }
          if (room.type === 'wards') {
            for (let i = -4; i <= 2; i += 3) el('rect', { x: rp.x + i, y: rp.y - 2, width: 2, height: 4, fill: '#806858', opacity: 0.5 }, g);
          }
          if (room.type === 'admin') {
            el('rect', { x: rp.x - 3, y: rp.y - 1, width: 6, height: 3, fill: '#587878', opacity: 0.5 }, g);
          }
        }

        el('text', {
          x: rp.x, y: rp.y + (detailed ? 2 : 1.5),
          fill: '#fff', 'font-size': detailed ? 4.5 : 4, 'text-anchor': 'middle', text: room.name
        }, g);
      });

      const corridors = [[0,0,0,14],[0,0,0,-14],[0,0,14,0],[0,0,-14,0]];
      corridors.forEach(([x1,z1,x2,z2]) => {
        const a = unityToSvg(x1, z1), b = unityToSvg(x2, z2);
        el('line', { x1: a.x, y1: a.y, x2: b.x, y2: b.y, stroke: '#e8e8e0', 'stroke-width': detailed ? 2.5 : 1.8, 'stroke-linecap': 'round' }, g);
      });
    }

    function buildLabInset() {
      const svg = document.getElementById('labSvg');
      svg.innerHTML = '';
      const defs = el('defs', {}, svg);
      defs.innerHTML = document.getElementById('mapDefs').innerHTML;
      drawLabPlan(svg, true);
    }

    function buildMap() {
      buildDefs();
      mapEl.querySelectorAll('g#world').forEach(n => n.remove());
      const g = el('g', { id: 'world' }, mapEl);

      el('rect', {
        x: -TERRAIN.half, y: -TERRAIN.half,
        width: TERRAIN.width, height: TERRAIN.length,
        fill: '#1a2820', stroke: '#3a4840', 'stroke-width': 0.8
      }, g);

      buildTerrain(g);
      buildContours(g);
      buildVegetation(g);
      buildInfrastructure(g);
      buildGrid(g);

      const locG = el('g', { id: 'locations' }, g);
      LOCATIONS.forEach(loc => { if (loc.shape !== 'railway') drawLocation(loc, locG); });

      drawLabPlan(g, false);
      applyTransform();
    }

    function buildLocationList() {
      const list = document.getElementById('locationList');
      list.innerHTML = '';
      LOCATIONS.forEach(loc => {
        const item = document.createElement('div');
        item.className = 'loc-item';
        item.dataset.id = loc.id;
        const y = loc.y ?? interpolateY(loc.x, loc.z);
        item.innerHTML = `<div class="name">${loc.name}</div><div class="meta">(${loc.x}, ${y}, ${loc.z})</div>`;
        item.addEventListener('click', () => selectLocation(loc.id));
        list.appendChild(item);
      });
    }

    function buildLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      [
        ['Лаборатория 0м', biomeColor(0, 0, 0)],
        ['Пустырь +10м', biomeColor(10, -110, 70)],
        ['Рельсы +15м', biomeColor(15, -20, 100)],
        ['Маяк +40м', biomeColor(40, 110, 100)],
        ['Вода −15м', biomeColor(-15, -110, -120)]
      ].forEach(([label, color]) => {
        const row = document.createElement('div');
        row.className = 'legend-row';
        row.innerHTML = `<span class="legend-swatch" style="background:${color}"></span><span>${label}</span>`;
        legend.appendChild(row);
      });
    }

    function selectLocation(id) {
      state.selected = LOCATIONS.find(l => l.id === id);
      document.querySelectorAll('.loc-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
      document.querySelectorAll('.loc-marker').forEach(el => {
        el.classList.toggle('selected', el.dataset.id === id);
        el.style.opacity = el.dataset.id === id ? '1' : '0.88';
      });

      const panel = document.getElementById('detailPanel');
      const loc = state.selected;
      if (!loc) { panel.classList.remove('visible'); return; }

      panel.classList.add('visible');
      document.getElementById('detailName').textContent = loc.name;
      document.getElementById('detailDesc').textContent = loc.desc + ' · ' + loc.tz;
      const y = loc.y ?? interpolateY(loc.x, loc.z);
      document.getElementById('detailCoords').textContent = `Vector3(${loc.x}, ${y}, ${loc.z}) · ~${loc.w}×${loc.h} м`;
      document.getElementById('labInset').style.display = loc.id === 'lab' ? 'block' : 'none';

      const p = unityToSvg(loc.x, loc.z);
      state.panX = -p.x * state.scale;
      state.panY = -p.y * state.scale;
      applyTransform();
    }

    function applyTransform() {
      const world = document.getElementById('world');
      if (world) world.setAttribute('transform', `translate(${state.panX},${state.panY}) scale(${state.scale})`);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }

    mapWrap.addEventListener('wheel', e => {
      e.preventDefault();
      state.scale = Math.min(5, Math.max(0.35, state.scale * (e.deltaY > 0 ? 0.9 : 1.1)));
      applyTransform();
    }, { passive: false });

    mapWrap.addEventListener('mousedown', e => {
      if (e.target.closest('.loc-marker')) return;
      state.dragging = true;
      state.dragStart = { x: e.clientX - state.panX, y: e.clientY - state.panY };
      mapWrap.classList.add('dragging');
    });
    window.addEventListener('mousemove', e => {
      if (state.dragging) {
        state.panX = e.clientX - state.dragStart.x;
        state.panY = e.clientY - state.dragStart.y;
        applyTransform();
      }
      const world = document.getElementById('world');
      if (!world) return;
      const wtm = world.getScreenCTM();
      if (!wtm) return;
      const pt = mapEl.createSVGPoint();
      pt.x = e.clientX; pt.y = e.clientY;
      const worldPt = pt.matrixTransform(wtm.inverse());
      const u = svgToUnity(worldPt.x, worldPt.y);
      document.getElementById('cursorCoords').textContent =
        `X: ${Math.round(u.x)}  Z: ${Math.round(u.z)}  Y: ${interpolateY(Math.round(u.x), Math.round(u.z))}`;
    });
    window.addEventListener('mouseup', () => { state.dragging = false; mapWrap.classList.remove('dragging'); });

    document.getElementById('btnReset').addEventListener('click', () => {
      state.panX = 0; state.panY = 0; state.scale = 1;
      applyTransform();
    });

    document.getElementById('btnCopy').addEventListener('click', () => {
      if (!state.selected) return;
      const loc = state.selected;
      const y = loc.y ?? interpolateY(loc.x, loc.z);
      const text = `new Vector3(${loc.x}f, ${y}f, ${loc.z}f)`;
      navigator.clipboard.writeText(text);
      showToast('Скопировано: ' + text);
    });

    document.getElementById('btnExport').addEventListener('click', () => {
      const data = {
        terrain: TERRAIN,
        locations: LOCATIONS.map(l => ({
          id: l.id, name: l.name,
          position: { x: l.x, y: l.y ?? interpolateY(l.x, l.z), z: l.z },
          size: { w: l.w, h: l.h }
        })),
        labRooms: LAB_ROOMS.map(r => ({ id: r.id, name: r.name, localPosition: { x: r.x, z: r.z }, size: { w: r.w, h: r.h } })),
        roads: ROADS
      };
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
      a.download = 'quest-world-map.json';
      a.click();
      showToast('Экспорт JSON');
    });

    const toggles = {
      toggleGrid: ['grid'],
      toggleElev: ['elevation', 'ridge'],
      toggleContours: ['contours'],
      toggleNature: ['nature'],
      togglePaths: ['paths'],
      toggleLab: ['labCross']
    };
    Object.entries(toggles).forEach(([id, layers]) => {
      document.getElementById(id).addEventListener('change', e => {
        layers.forEach(lid => {
          const layer = document.getElementById(lid);
          if (layer) layer.style.display = e.target.checked ? '' : 'none';
        });
      });
    });
    document.getElementById('toggleLabels').addEventListener('change', e => {
      document.querySelectorAll('.loc-label').forEach(el => { el.style.display = e.target.checked ? '' : 'none'; });
    });

    buildMap();
    buildLabInset();
    buildLocationList();
    buildLegend();
    selectLocation('lab');
  </script>
</body>
</html>
